server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/dependency-check
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# DependencyCheck 引擎配置
dependency-check:
  data-directory: ./data/dc-cache
  nvd-api-key: ${NVD_API_KEY:}
  max-scan-threads: 4

# 文件上传配置
app:
  upload-dir: ./uploads
  report-dir: ./reports

# 异步任务线程池配置
task:
  pool:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 10
    thread-name-prefix: scan-task-

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
