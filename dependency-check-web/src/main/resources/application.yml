server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/dependency-check
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # P2#8: 生产环境使用 Slf4jImpl，SQL日志由logback控制级别
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# DependencyCheck 引擎配置
dependency-check:
  data-directory: ./data/dc-cache
  nvd-api-key: ${NVD_API_KEY:}
  max-scan-threads: 4

# 文件上传配置
app:
  upload-dir: ./uploads
  report-dir: ./reports
  # C4 修复（7/3）：CORS 跨域来源配置，开发环境默认 localhost:3000（与 Vite dev server 端口一致）
  cors:
    allowed-origin: http://localhost:3000
  # D4（7/6）：阿里云 OSS 配置，默认关闭，生产环境通过环境变量开启
  oss:
    enabled: false
    endpoint: ${OSS_ENDPOINT:}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:}

# 异步任务线程池配置
task:
  pool:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 10
    thread-name-prefix: scan-task-

# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
    doc-expansion: list
  packages-to-scan: com.alibaba.dependencycheck.controller

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
